<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- PWA / iOS -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="kept. graced. blessed." />
    <meta name="theme-color" content="#c24a68" />
    <meta name="description" content="Your personal NKJV Bible app — read, reflect, and grow." />

    <!-- Icons -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="%PUBLIC_URL%/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="%PUBLIC_URL%/icon-512.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- iOS Splash Screens (iPhone 14 Pro / common sizes) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />

    <title>kept. graced. blessed.</title>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root {
        height: 100%;
        min-height: 100vh;
        min-height: -webkit-fill-available;
        background-color: #fdf0f3;
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
      }
      body {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }
      /* iOS safe area support */
      #root {
        padding-top: env(safe-area-inset-top);
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
